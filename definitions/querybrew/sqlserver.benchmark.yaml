title: SQLServer
repetitions: 5
warmup: 3
timeout: 60
global_timeout: 0
fetch_result: true
query_plan:
  retrieve: true
  system_representation: true
output: results/querybrew/sqlserver/
parameter:
  version: "2025-latest"
  umbra_planner: false
  cpus: 16
  memory: "32G"
  umbra_planner_settings:
    usedirectio: true
    multiway: d
    optimizer.sidewayinformationpassing: false
  umbra_planner_parameter:
    version: "26.01"
systems:
  - title: SQLServer
    dbms: sqlserver
    disabled: false
  - title: SQLServer (Umbra Planner)
    dbms: sqlserver
    disabled: false
    parameter:
      umbra_planner: true
  - title: SQLServer (Umbra Planner, no join optimizer)
    dbms: sqlserver
    disabled: false
    parameter:
      umbra_planner: true
      force_order: true
benchmarks:
  - name: tpch
    scale: 10
  - name: tpcds
    scale: 10
  - name: ssb
    scale: 10
  - name: job
