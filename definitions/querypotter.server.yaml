optimizer: Umbra

datasets:
  - name: tpch
    scale: 1
  - name: tpcds
    scale: 1
  - name: ssb
    scale: 1
  - name: job

systems:
  - title: Umbra
    dbms: umbra
    disabled: false
    parameter:
      version: "26.01"
    settings: 
      optimizer.sidewayinformationpassing: false
      multiway: d

  - title: DuckDB
    dbms: duckdb
    disabled: false

  - title: DuckDB (no join optimizer)
    dbms: duckdb
    disabled: false
    settings:
      disabled_optimizers: "join_order,build_side_probe_side"

  - title: ClickHouse
    dbms: clickhouse
    disabled: false
    parameter:
      version: "25.11"

  - title: ClickHouse (no join optimizer)
    dbms: clickhouse
    disabled: false
    parameter:
      version: "25.11"
    settings:
      query_plan_optimize_join_order_limit: 1

  - title: SQLServer
    dbms: sqlserver
    disabled: false
    parameter:
      version: "2025-latest"

  - title: SQLServer (no join optimizer)
    dbms: sqlserver
    disabled: false
    parameter:
      version: "2025-latest"
      force_order: true

  - title: Postgres
    dbms: postgres
    disabled: false
    parameter:
      version: "18"

  - title: Postgres (no join optimizer)
    dbms: postgres
    disabled: false
    settings:
      join_collapse_limit: 1
      from_collapse_limit: 1
    parameter:
      version: "18"
