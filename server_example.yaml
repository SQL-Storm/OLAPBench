# Example server configuration for interactive querying
# Start DBMS instances and expose HTTP endpoints

benchmark:
  name: tpch
  scale: 0.01

# Use an empty Umbra as a schema-only optimizer. Target DBMS instances still load data,
# and the frontend can pass cached /planner/statistics JSON into /optimize.
optimizer: Umbra (empty optimizer)
optimizer_schema_only: true

systems:
  - title: Umbra (empty optimizer)
    dbms: umbradev
    disabled: false
    settings: {}

  - title: Umbra
    dbms: umbradev
    disabled: false
    settings: {}

  - title: DuckDB
    dbms: duckdb
    disabled: false
    settings:
      max_expression_depth: 10000

  - title: DuckDB (no join optimizer)
    dbms: duckdb
    disabled: false
    settings:
      max_expression_depth: 10000
      disabled_optimizers: "join_order,build_side_probe_side"
